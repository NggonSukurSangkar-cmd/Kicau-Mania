<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Kicau Mania 🔥</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Comic Sans MS, Arial, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff00cc,#ff8800,#00eaff,#00ff55);
background-size:400% 400%;
animation:bg 7s infinite alternate;
padding:20px;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:45px;
border-radius:30px;
text-align:center;
max-width:700px;
width:100%;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

h1{
font-size:55px;
color:white;
text-shadow:4px 4px 0 black;
margin-bottom:10px;
}

h2{
font-size:28px;
color:#fff700;
margin-bottom:20px;
text-shadow:2px 2px 0 black;
}

p{
font-size:20px;
color:white;
font-weight:bold;
margin-bottom:25px;
line-height:1.7;
}

.btn{
padding:18px 35px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
background:#fff700;
color:black;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.btn:hover{
transform:scale(1.1);
background:#00ff55;
}

.note{
margin-top:18px;
font-size:18px;
color:white;
}

@media(max-width:768px){
h1{font-size:38px;}
h2{font-size:22px;}
p{font-size:17px;}
.btn{font-size:18px;padding:15px 28px;}
}
</style>
</head>

<body>

<div class="box">

<h1>DJ KICAU MANIA</h1>
<h2>🔥 GOYANG BURUNG NASIONAL 🔥</h2>

<p>
Sekali pencet...<br>
langsung bunyi jedag jedug 😭🔥
</p>

<button class="btn" onclick="window.location.href='video.html'">
▶ PUTAR SEKARANG
</button>

<div class="note">
Siapkan speaker tetangga 💥
</div>

</div>

</body>
</html>
